server.port=${PORT:8080}

# Configure multipart upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Gemini API Configuration
gemini.model=gemini-2.5-flash
gemini.inter-agent-delay-ms=2000

# Agent Tech Stack Configuration (used in prompt templates)
agent.tech-stack.frontend=Angular
agent.tech-stack.backend=Java 21, Spring Boot 3

# Enable clean logging
logging.level.com.example.excelanalyzer=INFO
logging.level.org.springframework.web=INFO
